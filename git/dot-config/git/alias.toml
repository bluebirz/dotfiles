[alias]
  acp = "!f() { git add -A && git commit -m \"$@\" && git push; }; f"
  fpa = "!f() { git fetch --all && git pull --all && git remote prune origin && LANG=en_US; delb=$(git branch -vv | awk '/: gone]/{print $1}'); if [ -n \"$delb\" ]; then echo \"$delb\" | while IFS= read -r b; do git branch -d \"$b\"; done; fi; }; f"
  mdr = "!f() { git merge --no-commit --no-ff $@ && git reset --merge; }; f"
  mrg = "!f() { git merge $1 -m \"merge from $1\" --no-ff  && git push; }; f"
  ckb = "!f() { git checkout -b $@ && git push --set-upstream origin $@; }; f"
  brm = "!f() { git push origin -d \"$1\" && git branch -d \"$1\"; }; f"
  ign = "!f() { git rm -r --cached . && git add . ; }; f"

  lob = "log --all --graph --color=always --abbrev-commit --decorate --date=format-local:'%Y-%m-%d' --format=format:'%C(bold blue)%h%C(reset) - %C(bold cyan)%ad%C(reset) %C(bold green)(%ar)%C(reset)%C(auto)%d%C(reset) %C(white)%s%C(reset) - %C(#808080)%an%C(reset)'"
  dff = "diff -u"
  dffs = "diff --staged"
  cko = "checkout"
  stt = "status -u"
  baa = "branch -a"
  rss = "reset --soft HEAD^"    # reset to last commit. uncommit changes but staged
  rsm = "reset --mixed HEAD^"   # reset to last commit. uncommit changes and unstaged
  rsh = "reset --hard HEAD^"    # reset to last commit. uncommit changes and discard all changes
  rvr = "revert HEAD --no-edit" # revert to last commit
  wta = "worktree add"
  wtl = "worktree list"
  wtr = "worktree remove"
  als = "config --get-regexp alias"
  pullr = "pull --rebase"
  undo = "rebase --abort"
