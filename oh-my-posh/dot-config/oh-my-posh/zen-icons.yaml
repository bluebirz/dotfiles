version: 3
final_space: true
console_title_template: "{{ .Shell }} in {{ .Folder }}"
blocks:
  - type: prompt
    alignment: left
    newline: true
    segments:
      - style: plain
        template: "{{ .Path }} "
        foreground: "#87b3e6"
        background: transparent
        type: path
        properties:
          style: full
          folder_separator_icon: " ´âÜ "
          home_icon: "´à╣"
          right_format: "[%s]"
      - style: plain
        template:
          "{{ .UpstreamIcon }}  {{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus
          }}{{ end }}{{ if .Working.Changed }} ´üä {{ .Working.String }}{{ end
          }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if
          .Staging.Changed }} ´üå {{ .Staging.String }}{{ end }}{{ if gt
          .StashCount 0 }} ¾▒èò {{ .StashCount }}{{ end }} "
        foreground: "#ababab"
        background: transparent
        type: git
        properties:
          branch_icon: ""
          commit_icon: "@"
          fetch_status: true
          fetch_upstream_icon: true
          source: cli
      # - type: rprompt
      #   overflow: hidden
      #   segments:
      - style: plain
        template: " ´Æ½  {{ .CurrentDate | date .Format }}"
        foreground: "#808080"
        background: transparent
        type: time
        options:
          time_format: 2 Jun 15:04
      - style: plain
        template: " ¾░öƒ {{ .FormattedMs }}"
        foreground: "#808080"
        background: transparent
        type: executiontime
        properties:
          threshold: 1000
          style: round
          always_enabled: false
  - type: prompt
    alignment: left
    newline: true
    segments:
      - type: python
        foreground: "#FFE873"
        background: transparent
        template: " ¯£╝ {{ .Venv }} {{ .Full }} "
      - type: node
        foreground: "#539E43"
        background: transparent
        template: " ¯┤ì {{ .Full }} "
      - type: go
        foreground: "#79D4FD"
        background: transparent
        template: " ¯ÿº {{ .Full }} "
      - type: terraform
        foreground: "#5C4EE6"
        background: transparent
        template: " ¾▒üó {{.WorkspaceName}} "
      - type: rust
        foreground: "#F66601"
        background: transparent
        template: " ¯×¿ {{ .Full }} "
      - type: ruby
        foreground: "#ed1405"
        background: transparent
        template: " ¯×æ {{ .Full }} "
      - type: text
        style: plain
        foreground_templates:
          - "{{if gt .Code 0}}#e68d27{{end}}"
          - "{{if eq .Code 0}}#2780e6{{end}}"
        background: transparent
        template: "´üí "

transient_prompt:
  template: "´üí "
  foreground: "#2780e6"
  background: transparent
  foreground_templates:
    - "{{if gt .Code 0}}#e68d27{{end}}"
    - "{{if eq .Code 0}}#2780e6{{end}}"

secondary_prompt:
  template: "´üí "
  foreground: "#2780e6"
  background: transparent
