# yazi.toml
[mgr]
show_hidden = true
show_symlink = true
ratio = [1, 2, 2]

[opener]
edit = [
  { run = 'nvim "$@"', block = true, for = "macos" },
]

# git.yazi
[[plugin.prepend_fetchers]]
# id   = "git"
group = "git"
url = "*"
run  = "git"

[[plugin.prepend_fetchers]]
# id   = "git"
group = "git"
url = "*/"
run  = "git"


